name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC trusted publishing
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER="$(python -c 'import tomllib,pathlib; \
            d=tomllib.loads(pathlib.Path("pyproject.toml").read_text()); \
            import re; \
            p=d["tool"]["hatch"]["version"]["path"]; \
            print(re.search(r"__version__\s*=\s*[\"\x27]([^\"\x27]+)", pathlib.Path(p).read_text()).group(1))')"
          echo "tag=$TAG package=$VER"
          test "$TAG" = "$VER" || { echo "::error::tag v$TAG != package version $VER"; exit 1; }
      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
