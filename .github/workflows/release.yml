name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi
    permissions:
      # A job-level permissions block REPLACES the workflow-level one, so checkout
      # needs contents:read explicitly to clone the repo.
      contents: read
      id-token: write  # OIDC trusted publishing
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER="$(python -c 'import tomllib,pathlib; \
            d=tomllib.loads(pathlib.Path("pyproject.toml").read_text()); \
            import re; \
            p=d["tool"]["hatch"]["version"]["path"]; \
            print(re.search(r"__version__\s*=\s*[\"\x27]([^\"\x27]+)", pathlib.Path(p).read_text()).group(1))')"
          echo "tag=$TAG package=$VER"
          test "$TAG" = "$VER" || { echo "::error::tag v$TAG != package version $VER"; exit 1; }
      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
