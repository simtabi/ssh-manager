name: Release

# A v* tag cross-compiles the self-contained pure-Go binary for every OS/arch from
# a single runner (no CPython to freeze any more), and publishes the archives with
# checksums and a cosign signature to a GitHub Release. Homebrew cask / Scoop /
# Linux packages are a follow-on (they need the simtabi/homebrew-tap +
# simtabi/scoop-bucket repos and a TAP_GITHUB_TOKEN).
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          # Pure Go cross-compiles trivially, so every target builds on one runner -
          # including Intel mac (darwin/amd64), which the bundled-CPython era couldn't.
          - { goos: darwin, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
      - name: Build binary + archive
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VER="${GITHUB_REF_NAME#v}"
          LD="-s -w -X github.com/simtabi/ssh-manager/internal/version.Version=${VER}"
          NAME="ssh-manager_${VER}_${GOOS}_${GOARCH}"
          BIN=sshmgr
          [ "$GOOS" = windows ] && BIN=sshmgr.exe
          go build -trimpath -ldflags "$LD" -o "$BIN" ./cmd/sshmgr
          mkdir -p out
          tar czf "out/${NAME}.tar.gz" "$BIN" LICENSE README.md
          (cd out && sha256sum "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256")
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: out/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # create the GitHub Release
      id-token: write # cosign keyless signing
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # release notes from history
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true
      - name: Combine checksums
        shell: bash
        run: |
          cd dist
          cat *.tar.gz.sha256 > SHA256SUMS
          rm -f *.tar.gz.sha256
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign the checksums (keyless)
        shell: bash
        run: |
          # cosign v4: signature + certificate go in one Sigstore bundle.
          cd dist
          cosign sign-blob --yes --bundle SHA256SUMS.cosign.bundle SHA256SUMS
      - name: Create the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          # A pre-release identifier in the tag (e.g. -rc.1, -beta) marks it as a
          # GitHub pre-release.
          PRERELEASE=
          case "$GITHUB_REF_NAME" in *-*) PRERELEASE=--prerelease ;; esac
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "${{ github.repository }}" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes $PRERELEASE
