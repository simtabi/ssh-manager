version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    groups:
      python-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels: ["dependencies", "github-actions"]
    groups:
      actions:
        patterns: ["*"]

  # Keeps .pre-commit-config.yaml hook revisions current (gitleaks, ruff,
  # pre-commit-hooks). Dependabot gained pre-commit support on 2026-03-10.
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels: ["dependencies", "pre-commit"]
    groups:
      pre-commit:
        patterns: ["*"]
